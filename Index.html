<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRAQUE</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
<style>
:root{--forest:#0d1f0f;--forest-mid:#152b17;--acid:#7fff4f;--acid-dim:#4aad28;--amber:#ffb830;--red:#ff3c3c;--ghost:rgba(127,255,79,0.08);--text:#c8e6c9;--text-dim:#6a9b6e;--border:rgba(127,255,79,0.15)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--forest);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px}
#loading{position:fixed;inset:0;z-index:2000;background:var(--forest);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-logo{font-size:60px;font-weight:900;letter-spacing:-2px;color:var(--acid);text-shadow:0 0 30px rgba(127,255,79,.4)}
.loading-bar{width:200px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.loading-fill{height:100%;background:var(--acid);border-radius:2px;animation:load 1.2s ease forwards}
@keyframes load{from{width:0}to{width:100%}}
.loading-txt{font-family:monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim)}
#login-screen{position:fixed;inset:0;z-index:1000;background:var(--forest);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 20% 50%,rgba(45,90,48,.3),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(29,60,32,.4),transparent 50%)}
.logo{font-size:80px;font-weight:900;letter-spacing:-3px;color:var(--acid);line-height:1;text-shadow:0 0 40px rgba(127,255,79,.4);margin-bottom:4px}
.tagline{font-size:10px;color:var(--text-dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:48px;font-family:monospace}
.card{width:100%;max-width:360px;background:var(--forest-mid);border:1px solid var(--border);border-radius:2px;padding:28px}
.tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px;background:none;border:none;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);cursor:pointer;position:relative;transition:color .2s}
.tab.on{color:var(--acid)}
.tab.on::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--acid)}
.field{margin-bottom:14px}
.field label{display:block;font-family:monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:7px}
.field input{width:100%;background:var(--forest);border:1px solid var(--border);border-radius:2px;padding:11px 13px;font-family:monospace;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--acid-dim)}
.field input::placeholder{color:var(--text-dim)}
.btn-go{width:100%;background:var(--acid);border:none;border-radius:2px;padding:13px;font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--forest);cursor:pointer;margin-top:8px;transition:opacity .2s;position:relative}
.btn-go:hover{opacity:.85}
.btn-go:disabled{opacity:.5;cursor:not-allowed}
.btn-spin{display:none;position:absolute;right:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;border:2px solid var(--forest);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}
.err{margin-top:12px;padding:9px 13px;background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.3);border-radius:2px;font-family:monospace;font-size:11px;color:var(--red);display:none}
#app{display:none;position:fixed;inset:0;flex-direction:column}
#map{position:absolute;inset:0;z-index:1}
.leaflet-container{background:#0a1a0b}
.leaflet-tile{filter:brightness(0.55) saturate(0.4) hue-rotate(80deg)}
.leaflet-control-zoom{display:none}
.leaflet-popup-content-wrapper{background:var(--forest-mid);border:1px solid var(--border);border-radius:2px;color:var(--text);box-shadow:none}
.leaflet-popup-tip{background:var(--forest-mid)}
.leaflet-popup-content{margin:10px 14px;font-family:monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase}
#topbar{position:absolute;top:0;left:0;right:0;z-index:500;background:linear-gradient(to bottom,rgba(13,31,15,.98),rgba(13,31,15,0));padding:12px 14px 40px;display:flex;align-items:center;justify-content:space-between;pointer-events:none}
.tbadge{display:inline-flex;align-items:center;gap:8px;background:var(--forest-mid);border:1px solid var(--border);border-radius:2px;padding:6px 11px;pointer-events:all}
.tdot{width:8px;height:8px;border-radius:50%;background:var(--acid);box-shadow:0 0 8px var(--acid);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
.tname{font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.trole{font-family:monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:2px}
.rc{background:rgba(127,255,79,.15);color:var(--acid);border:1px solid rgba(127,255,79,.25)}
.rh{background:rgba(255,184,48,.2);color:var(--amber);border:1px solid rgba(255,184,48,.3)}
.ra{background:rgba(255,60,60,.15);color:var(--red);border:1px solid rgba(255,60,60,.3)}
.tbright{display:flex;align-items:center;gap:8px;pointer-events:all}
.online{display:flex;align-items:center;gap:5px;font-family:monospace;font-size:10px;color:var(--text-dim)}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--acid);animation:pulse 2s infinite}
.ibtn{background:var(--forest-mid);border:1px solid var(--border);border-radius:2px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);font-size:14px;transition:color .2s}
.ibtn:hover{color:var(--acid)}
#phase{position:absolute;top:62px;left:50%;transform:translateX(-50%);z-index:500;pointer-events:none}
.ppill{background:var(--forest-mid);border:1px solid var(--border);border-radius:2px;padding:6px 16px;text-align:center;white-space:nowrap}
.plabel{font-family:monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);display:block}
.pname{font-size:15px;font-weight:700;letter-spacing:1px;color:var(--acid);display:block}
.ptimer{font-family:monospace;font-size:22px;font-weight:700;color:var(--text);display:block;margin-top:2px}
.ptimer.urg{color:var(--red);animation:blink .5s infinite}
.ptimer.nogame{color:var(--text-dim);font-size:14px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* ZONE ALERT BANNER */
#zone-banner{position:absolute;top:140px;left:50%;transform:translateX(-50%);z-index:500;pointer-events:none;display:none;animation:tin .3s ease}
.zbbox{background:rgba(255,60,60,.2);border:1px solid rgba(255,60,60,.6);border-radius:2px;padding:8px 20px;text-align:center;white-space:nowrap;backdrop-filter:blur(4px)}
.zbtitle{font-family:monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);display:block}
.zbval{font-family:monospace;font-size:24px;font-weight:700;color:var(--red);display:block}
.zbgrace{font-family:monospace;font-size:11px;color:var(--amber);display:block}
/* ROUND TRANSITION OVERLAY */
#round-overlay{position:fixed;inset:0;z-index:800;background:rgba(13,31,15,.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ro-round{font-family:monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dim)}
.ro-name{font-size:48px;font-weight:900;letter-spacing:-1px;color:var(--acid);text-shadow:0 0 40px rgba(127,255,79,.4);text-align:center;padding:0 20px}
.ro-desc{font-size:14px;color:var(--text-dim);text-align:center;max-width:300px;line-height:1.6}
.ro-timer{font-family:monospace;font-size:14px;color:var(--text-dim)}
#bottombar{position:absolute;bottom:0;left:0;right:0;z-index:500;background:linear-gradient(to top,rgba(13,31,15,.99),rgba(13,31,15,0));padding:28px 14px 18px}
#nav{display:flex;gap:3px;background:var(--forest-mid);border:1px solid var(--border);border-radius:2px;padding:4px}
.nbtn{flex:1;background:none;border:none;padding:9px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:2px;transition:background .15s}
.nbtn.on{background:rgba(127,255,79,.12)}
.nbtn .ni{font-size:16px;line-height:1}
.nbtn span{font-family:monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim)}
.nbtn.on span{color:var(--acid)}
#layer-ctrl{position:absolute;left:14px;bottom:90px;z-index:500;display:flex;flex-direction:column;gap:5px}
.lbtn{background:var(--forest-mid);border:1px solid var(--border);border-radius:2px;padding:5px 10px;font-family:monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:all .2s}
.lbtn.on{color:var(--acid);border-color:rgba(127,255,79,.4)}
.drawer{position:fixed;inset:0;z-index:600;display:none;flex-direction:column}
.drawer.on{display:flex}
.doverlay{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.dpanel{position:absolute;bottom:0;left:0;right:0;background:var(--forest-mid);border-top:1px solid var(--border);max-height:82vh;overflow-y:auto;padding:18px 15px 30px}
.dpanel.full{top:0;bottom:0;max-height:100%;border:none;overflow-y:auto}
.dhandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.dtitle{font-size:20px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--acid);margin-bottom:18px;display:flex;align-items:center;gap:9px}
.dsub{font-family:monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
.xbtn{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:22px}
.srow{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid rgba(127,255,79,.06);gap:11px}
.srank{font-family:monospace;font-size:11px;color:var(--text-dim);width:22px;text-align:right}
.srank.gold{color:var(--amber);font-size:14px}
.sname{font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.spts{font-family:monospace;font-size:14px;color:var(--acid)}
.sbar{width:100%;height:3px;background:var(--ghost);border-radius:2px;margin-top:5px}
.sbarfill{height:100%;border-radius:2px;transition:width .6s ease}
.trow{display:flex;align-items:center;padding:13px 11px;background:var(--forest);border:1px solid var(--border);border-radius:2px;margin-bottom:7px;gap:11px}
.tind{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tinfo{flex:1}
.trname{font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.trmembers{font-size:12px;color:var(--text-dim);margin-top:2px}
.tstatus{font-family:monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:2px}
.st-a{background:rgba(127,255,79,.12);color:var(--acid);border:1px solid rgba(127,255,79,.2)}
.st-e{background:rgba(255,60,60,.1);color:var(--red);border:1px solid rgba(255,60,60,.2)}
.st-h{background:rgba(255,184,48,.1);color:var(--amber);border:1px solid rgba(255,184,48,.2)}
.cmsg{padding:10px 11px;background:var(--forest);border:1px solid var(--border);border-radius:2px;margin-bottom:7px}
.cmhead{display:flex;justify-content:space-between;margin-bottom:4px}
.cmtype{font-family:monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase}
.cmtime{font-family:monospace;font-size:9px;color:var(--text-dim)}
.cmtext{font-size:13px;line-height:1.5}
.cap .cmtype{color:var(--amber)}.ann .cmtype{color:var(--acid)}.ale .cmtype{color:var(--red)}
.asec{margin-bottom:22px}
.asectitle{font-family:monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.abtn{display:flex;align-items:center;gap:9px;width:100%;background:var(--forest);border:1px solid var(--border);border-radius:2px;padding:13px 14px;color:var(--text);font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:7px}
.abtn:hover{border-color:var(--acid-dim);background:rgba(127,255,79,.05)}
.abtn.danger{border-color:rgba(255,60,60,.3);color:var(--red)}
.abtn.danger:hover{background:rgba(255,60,60,.08)}
.abtn.ok{border-color:rgba(127,255,79,.4);color:var(--acid)}
.abtn.ok:hover{background:rgba(127,255,79,.1)}
.abtn:disabled{opacity:.4;cursor:not-allowed}
.abtn .ai{font-size:16px}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.bcard{background:var(--forest);border:1px solid var(--border);border-radius:2px;padding:11px 7px;text-align:center}
.bicon{font-size:26px;margin-bottom:4px}
.bname{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text);display:block}
.bcard.earn{border-color:rgba(255,184,48,.5);background:rgba(255,184,48,.06)}
.bcard:not(.earn) .bicon{opacity:.25;filter:grayscale(1)}
.bcard:not(.earn) .bname{color:var(--text-dim)}
#toasts{position:fixed;top:78px;left:50%;transform:translateX(-50%);z-index:700;display:flex;flex-direction:column;gap:7px;pointer-events:none;width:calc(100% - 28px);max-width:400px}
.toast{background:var(--forest-mid);border:1px solid var(--border);border-radius:2px;padding:11px 14px;display:flex;align-items:center;gap:11px;animation:tin .3s ease,tout .3s ease 2.7s forwards}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(-10px)}}
.ticon{font-size:18px}.ttext{font-size:13px;line-height:1.4}
.ttitle{font-weight:700;color:var(--acid);font-size:13px;text-transform:uppercase;letter-spacing:1px}
.tsel{width:100%;background:var(--forest);border:1px solid var(--border);border-radius:2px;padding:10px 12px;color:var(--text);font-size:13px;margin-bottom:8px;outline:none}
.tsel option{background:var(--forest-mid)}
.tinput{width:100%;background:var(--forest);border:1px solid var(--border);border-radius:2px;padding:10px 12px;color:var(--text);font-family:monospace;font-size:13px;margin-bottom:8px;outline:none}
.tinput:focus{border-color:var(--acid-dim)}
.gps-accuracy{stroke:rgba(127,255,79,.3);stroke-width:1;fill:rgba(127,255,79,.05)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">TRAQUE</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-txt" id="loading-txt">Chargement...</div>
</div>

<div id="login-screen" style="display:none">
  <div class="logo">TRAQUE</div>
  <div class="tagline">Cache-Cache Tactique en Foret</div>
  <div class="card">
    <div class="tabs">
      <button class="tab on" onclick="switchTab('eq')">Equipe</button>
      <button class="tab" onclick="switchTab('adm')">Admin</button>
    </div>
    <div id="teq">
      <div class="field"><label>Code equipe</label><input id="tcode" type="text" placeholder="ex: LOUP-GRIS" autocomplete="off" autocapitalize="characters"></div>
      <div class="field"><label>Mot de passe</label><input id="tpass" type="password" placeholder="..."></div>
      <button class="btn-go" id="btn-tl" onclick="loginTeam()">Rejoindre<div class="btn-spin" id="sp-t"></div></button>
    </div>
    <div id="tadm" style="display:none">
      <div class="field"><label>Identifiant</label><input id="auser" type="text" placeholder="admin" autocomplete="off"></div>
      <div class="field"><label>Mot de passe</label><input id="apass" type="password" placeholder="..."></div>
      <button class="btn-go" id="btn-al" onclick="loginAdmin()">Acceder<div class="btn-spin" id="sp-a"></div></button>
    </div>
    <div class="err" id="errmsg">Code ou mot de passe incorrect.</div>
  </div>
</div>

<div id="app">
  <div id="map"></div>

  <!-- ZONE ALERT BANNER -->
  <div id="zone-banner">
    <div class="zbbox">
      <span class="zbgrace" id="zb-grace">Sortie de zone !</span>
      <span class="zbtitle">HORS ZONE</span>
      <span class="zbval" id="zb-malus">-1 pt</span>
    </div>
  </div>

  <!-- ROUND TRANSITION OVERLAY -->
  <div id="round-overlay">
    <div class="ro-round" id="ro-round">MANCHE 1</div>
    <div class="ro-name" id="ro-name">CACHE</div>
    <div class="ro-desc" id="ro-desc">Cachez-vous ! Les chasseurs ne bougent pas.</div>
    <div class="ro-timer" id="ro-timer">Debut dans 5...</div>
  </div>

  <div id="layer-ctrl">
    <div class="lbtn on" id="lbtn-chemins" onclick="toggleLayer('chemins')">Chemins</div>
    <div class="lbtn on" id="lbtn-eau" onclick="toggleLayer('eau')">Eau</div>
    <div class="lbtn on" id="lbtn-limite" onclick="toggleLayer('limite')">Zone</div>
  </div>

  <div id="topbar">
    <div class="tbadge">
      <div class="tdot" id="tdot"></div>
      <span class="tname" id="tname">-</span>
      <span class="trole rc" id="trole">CHASSE</span>
    </div>
    <div class="tbright">
      <div class="online"><div class="online-dot"></div><span id="ocnt">-</span></div>
      <div class="ibtn" onclick="logout()">&#x23CE;</div>
    </div>
  </div>

  <div id="phase">
    <div class="ppill">
      <span class="plabel" id="plabel">En attente</span>
      <span class="pname" id="pname">Partie non demarree</span>
      <span class="ptimer nogame" id="ptimer">-</span>
    </div>
  </div>

  <div id="bottombar">
    <div id="nav">
      <button class="nbtn on" onclick="navClick(this,'')"><span class="ni">&#x1F5FA;</span><span>Carte</span></button>
      <button class="nbtn" onclick="navClick(this,'scores')"><span class="ni">&#x1F4CA;</span><span>Scores</span></button>
      <button class="nbtn" onclick="navClick(this,'teams')"><span class="ni">&#x1F465;</span><span>Equipes</span></button>
      <button class="nbtn" onclick="navClick(this,'chat')"><span class="ni">&#x1F4FB;</span><span>Radio</span></button>
      <button class="nbtn" id="nadmin" style="display:none" onclick="navClick(this,'admin')"><span class="ni">&#x2699;&#xFE0F;</span><span>Admin</span></button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<div class="drawer" id="d-scores">
  <div class="doverlay" onclick="closeDrawer('scores')"></div>
  <div class="dpanel">
    <div class="dhandle"></div>
    <div class="dtitle">Classement</div>
    <div class="dsub" id="score-sub">En attente</div>
    <div id="score-list"></div>
    <div class="dsub" style="margin-top:20px">Badges</div>
    <div class="bgrid" id="badge-grid"></div>
  </div>
</div>
<div class="drawer" id="d-teams">
  <div class="doverlay" onclick="closeDrawer('teams')"></div>
  <div class="dpanel">
    <div class="dhandle"></div>
    <div class="dtitle">Equipes</div>
    <div id="team-list"></div>
  </div>
</div>
<div class="drawer" id="d-chat">
  <div class="doverlay" onclick="closeDrawer('chat')"></div>
  <div class="dpanel">
    <div class="dhandle"></div>
    <div class="dtitle">Radio Tactique</div>
    <div class="dsub">Lecture seule</div>
    <div id="chat-list"></div>
  </div>
</div>
<div class="drawer" id="d-admin">
  <div class="doverlay" onclick="closeDrawer('admin')"></div>
  <div class="dpanel full" style="position:relative">
    <button class="xbtn" onclick="closeDrawer('admin')">&#x2715;</button>
    <div style="margin:8px 0 20px"><div class="dtitle">Panneau Admin</div></div>
    <div class="asec">
      <div class="asectitle">Controle de partie</div>
      <button class="abtn ok" id="btn-sg" onclick="adminStartGame()"><span class="ai">&#x25B6;</span> Lancer une partie</button>
      <button class="abtn danger" id="btn-stop" onclick="adminStopGame()" disabled><span class="ai">&#x23F9;</span> Arreter la partie</button>
    </div>
    <div class="asec">
      <div class="asectitle">Roles</div>
      <select class="tsel" id="role-team"></select>
      <select class="tsel" id="role-val"><option value="chasse">Chasse</option><option value="chasseur">Chasseur</option></select>
      <button class="abtn" onclick="adminSetRole()">Appliquer le role</button>
    </div>
    <div class="asec">
      <div class="asectitle">Elimination manuelle</div>
      <select class="tsel" id="elim-team"></select>
      <button class="abtn danger" onclick="adminEliminate()">Eliminer cette equipe</button>
    </div>
    <div class="asec">

// ══ SUPABASE ══════════════════════════════════
async function sb(path,opts={}){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{headers:{...H,'Prefer':opts.prefer||'return=representation'},...opts});
  return r.json();
}
const sbGet=p=>sb(p);
const sbPost=(p,b)=>sb(p,{method:'POST',body:JSON.stringify(b)});
const sbPatch=(p,b)=>sb(p,{method:'PATCH',body:JSON.stringify(b),prefer:'return=representation'});

// ══ INIT ══════════════════════════════════════
async function init(){
  try{
    const[td,ed]=await Promise.all([sbGet('teams?select=*&order=name'),sbGet('events?select=*&order=created_at.desc&limit=1')]);
    teams=Array.isArray(td)?td:[];
    event_=Array.isArray(ed)&&ed.length?ed[0]:null;
    if(event_&&event_.status==='active'){
      const gd=await sbGet('games?event_id=eq.'+event_.id+'&status=eq.active&limit=1');
      game=Array.isArray(gd)&&gd.length?gd[0]:null;
    }
    setTimeout(()=>{document.getElementById('loading').style.display='none';document.getElementById('login-screen').style.display='flex';},1000);
  }catch(e){
    document.getElementById('loading-txt').textContent='Erreur de connexion';
    setTimeout(()=>{document.getElementById('loading').style.display='none';document.getElementById('login-screen').style.display='flex';},2000);
  }
}

// ══ LOGIN ═════════════════════════════════════
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',(i===0&&t==='eq')||(i===1&&t==='adm')));
  document.getElementById('teq').style.display=t==='eq'?'block':'none';
  document.getElementById('tadm').style.display=t==='adm'?'block':'none';
}
async function loginTeam(){
  const code=document.getElementById('tcode').value.toUpperCase().trim(),pass=document.getElementById('tpass').value.trim();
  if(!code||!pass)return;setSpin('t',true);
  try{
    const d=await sbGet('teams?name=eq.'+encodeURIComponent(code)+'&select=*');
    if(!Array.isArray(d)||!d.length||d[0].password_hash!==pass){showErr();return;}
    const t=d[0];CU={type:'team',name:t.name,id:t.id,color:t.color,role:t.role};myId=t.id;boot();
  }catch(e){showErr();}finally{setSpin('t',false);}
}

    CU={type:'admin',name:'ADMIN'};boot();
  }catch(e){showErr();}finally{setSpin('a',false);}
}

// ══ MAP ═══════════════════════════════════════
function initMap(){
  map=L.map('map',{center:[48.7798,2.6710],zoom:15,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,opacity:0.6}).addTo(map);
  L.geoJSON(GEO_FORET_FOND,{style:{fillColor:'#1a3d1e',fillOpacity:0.7,color:'transparent',weight:0}}).addTo(map);
  L.geoJSON(GEO_FORET_DESSIN,{style:f=>{
    const lu=f.properties.landuse;
    if(lu==='forest')return{fillColor:'#1e4a22',fillOpacity:0.5,color:'transparent',weight:0};
    if(lu==='farmland')return{fillColor:'#2a3d1a',fillOpacity:0.3,color:'transparent',weight:0};
    return{fillColor:'#152b17',fillOpacity:0.4,color:'transparent',weight:0};
  }}).addTo(map);
  L.geoJSON(GEO_TERRAIN,{style:{fillColor:'#d4c89a',fillOpacity:0.3,color:'rgba(212,200,154,0.5)',weight:1}}).addTo(map);
  L.geoJSON(GEO_BATIMENTS,{style:{fillColor:'#3d3520',fillOpacity:0.8,color:'rgba(100,90,50,0.6)',weight:1}}).addTo(map);
  mapLayers.chemins=L.geoJSON(GEO_CHEMINS,{style:f=>{
    const hw=f.properties.highway;
    if(hw==='track')return{color:'rgba(180,140,80,0.7)',weight:2,dashArray:'6 4'};
    if(hw==='path'||hw==='footway')return{color:'rgba(150,120,60,0.6)',weight:1.5,dashArray:'4 3'};
    return{color:'rgba(160,130,70,0.5)',weight:1.5};
  }}).addTo(map);
  mapLayers.eau=L.geoJSON(GEO_EAU,{style:{fillColor:'#1a4a6e',fillOpacity:0.7,color:'rgba(60,130,200,0.6)',weight:1}}).addTo(map);
  mapLayers.limite=L.geoJSON(GEO_LIMITE,{style:{color:'rgba(127,255,79,0.8)',weight:2.5,dashArray:'10 6',fillOpacity:0}}).addTo(map);
  mapLayers.subzone=L.geoJSON(GEO_SUBZONE,{style:{color:'rgba(255,184,48,0.9)',weight:2,dashArray:'6 4',fillColor:'rgba(255,184,48,0.08)',fillOpacity:1}});

  // Build polygon for point-in-polygon checks
  buildZonePolygons();
}

// Build zone polygons for GPS containment checks
function buildZonePolygons(){
  // Extract all coords from Limite LineStrings and close into polygon
  const allCoords=[];
  GEO_LIMITE.features.forEach(f=>{
    if(f.geometry.type==='LineString')allCoords.push(...f.geometry.coordinates);
  });
  limitePolygon=allCoords; // array of [lng,lat]

  // Subzone polygon from GEO_SUBZONE
  const sf=GEO_SUBZONE.features[0];
  if(sf&&sf.geometry.type==='Polygon')subzonePolygon=sf.geometry.coordinates[0];
}

// Point-in-polygon (ray casting)
function pointInPolygon(lat,lng,polygon){
  if(!polygon||polygon.length<3)return true; // no polygon = inside
  let inside=false;
  const x=lng,y=lat;
  for(let i=0,j=polygon.length-1;i<polygon.length;j=i++){
    const xi=polygon[i][0],yi=polygon[i][1];
    const xj=polygon[j][0],yj=polygon[j][1];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}

function isInsideActiveZone(lat,lng){
  if(!game||game.status!=='active')return true;
  const round=game.current_round||0;
  if(round===3&&subzonePolygon)return pointInPolygon(lat,lng,subzonePolygon);
  return pointInPolygon(lat,lng,limitePolygon);
}

function toggleLayer(name){
  const layer=mapLayers[name];if(!layer)return;
  layerVisible[name]=!layerVisible[name];
  if(layerVisible[name])map.addLayer(layer);else map.removeLayer(layer);
  document.getElementById('lbtn-'+name).classList.toggle('on',layerVisible[name]);
}

function updateTeamMarkers(){
  Object.values(teamMarkers).forEach(m=>map.removeLayer(m));teamMarkers={};
  teams.forEach(t=>{
    const isMe=CU.type==='team'&&t.id===myId;
    const canSee=isMe||CU.type==='admin'||t.status==='eliminated';
    if(!canSee||!t.lat||!t.lng)return;
    const opacity=t.status==='eliminated'?0.35:1;
    const size=isMe?16:12;
    const icon=L.divIcon({className:'',html:`<div style="width:${size}px;height:${size}px;background:${t.color};border:2px solid #0d1f0f;border-radius:50%;box-shadow:0 0 ${isMe?14:8}px ${t.color}88;opacity:${opacity}"></div>`,iconSize:[size,size],iconAnchor:[size/2,size/2]});
    const m=L.marker([t.lat,t.lng],{icon}).addTo(map);
    m.bindPopup(`<span style="color:${t.color}">${t.name}</span>`);
    teamMarkers[t.id]=m;
  });
}

// ══ GPS ═══════════════════════════════════════
function startGPS(){
  if(!navigator.geolocation||CU.type==='admin')return;
  gpsId=navigator.geolocation.watchPosition(async pos=>{
    const{latitude:lat,longitude:lng,accuracy}=pos.coords;
    myLat=lat;myLng=lng;
    const icon=L.divIcon({className:'',html:`<div style="width:16px;height:16px;background:${CU.color};border:2px solid #0d1f0f;border-radius:50%;box-shadow:0 0 14px ${CU.color}cc"></div>`,iconSize:[16,16],iconAnchor:[8,8]});
    if(myMarker)map.removeLayer(myMarker);
    myMarker=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map);
    if(myAccCircle)map.removeLayer(myAccCircle);
    if(accuracy<80){myAccCircle=L.circle([lat,lng],{radius:accuracy,className:'gps-accuracy'}).addTo(map);}
    const t=teams.find(t=>t.id===myId);
    if(t){t.lat=lat;t.lng=lng;}
    updateTeamMarkers();
    try{await sb('positions?team_id=eq.'+myId,{method:'POST',body:JSON.stringify({team_id:myId,latitude:lat,longitude:lng,accuracy,updated_at:new Date().toISOString()}),headers:{...H,'Prefer':'resolution=merge-duplicates'}});}catch(e){}
  },()=>{},({enableHighAccuracy:true,maximumAge:2000,timeout:10000}));
}

// ══ ZONE CHECK (every second) ════════════════
function startZoneCheck(){
  if(zoneCheckInt)clearInterval(zoneCheckInt);
  zoneCheckInt=setInterval(()=>{
    if(!game||game.status!=='active'||CU.type==='admin')return;
    const round=game.current_round||0;
    if(round===1){hideZoneBanner();return;} // no malus in round 1
    if(myLat===null||myLng===null)return;

    const inside=isInsideActiveZone(myLat,myLng);
    if(inside){
      // Back in zone - reset
      if(wasOutOfZone){
        outOfZoneSeconds=0;malusIndex=0;wasOutOfZone=false;
        hideZoneBanner();
        toast('OK','Zone','Vous etes dans la zone');
      }
    }else{
      wasOutOfZone=true;
      outOfZoneSeconds++;
      if(outOfZoneSeconds<=GRACE_DELAY){
        // Grace period
        showZoneBanner(null,GRACE_DELAY-outOfZoneSeconds+1);
      }else{
        // Apply malus
        const secAfterGrace=outOfZoneSeconds-GRACE_DELAY;
        // Every 2 seconds apply next malus
        if(secAfterGrace%2===0){
          const pts=MALUS_SEQ[Math.min(malusIndex,MALUS_SEQ.length-1)];
          totalMalus+=pts;
          if(malusIndex<MALUS_SEQ.length-1)malusIndex++;
          showZoneBanner(pts,0);
          // Vibrate
          if(navigator.vibrate)navigator.vibrate([100,50,100]);
          // Apply to DB
          applyMalus(pts);
          // Auto-eliminate at 100 cumulative
          if(pts===100){
            autoEliminate();
          }
        }else{
          showZoneBanner(MALUS_SEQ[Math.min(malusIndex,MALUS_SEQ.length-1)],0);
        }
      }
    }
  },1000);
}

function showZoneBanner(pts,graceLeft){
  const banner=document.getElementById('zone-banner');
  const malus=document.getElementById('zb-malus');
  const grace=document.getElementById('zb-grace');
  banner.style.display='block';
  if(graceLeft>0){grace.textContent='Sortie de zone ! '+graceLeft+'s';malus.textContent='';}
  else{grace.textContent='HORS ZONE';malus.textContent='-'+pts+' pts';}
}

function hideZoneBanner(){document.getElementById('zone-banner').style.display='none';}

async function applyMalus(pts){
  try{
    const t=teams.find(t=>t.id===myId);
    if(!t)return;
    const ns=Math.max(0,(t.score||0)-pts);
    await sbPatch('teams?id=eq.'+myId,{score:ns});
    await sbPost('scores',{team_id:myId,game_id:game?.id,points:-pts,reason:'Malus hors zone'});
    t.score=ns;buildTeams();
  }catch(e){}
}

async function autoEliminate(){
  try{
    await sbPatch('teams?id=eq.'+myId,{status:'eliminated'});
    await sbPost('messages',{type:'alert',content:CU.name+' eliminee automatiquement (hors zone)',game_id:game?.id});
    toast('X','Elimine','Votre equipe est eliminee !');
    if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);
    hideZoneBanner();
    if(zoneCheckInt){clearInterval(zoneCheckInt);zoneCheckInt=null;}
  }catch(e){}
}

// ══ TIMER & ROUND LOGIC ═══════════════════════
function startTimer(){
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(!game||game.status!=='active')return;
    if(timerSec>0){
      timerSec--;
      // Warning at 3 min before end of round 2 = announce subzone
      if(timerSec===180&&game.current_round===2){
        sbPost('messages',{type:'announce',content:'Attention : Manche 3 dans 3 minutes ! Preparez-vous a rejoindre la sous-zone.',game_id:game.id});
        toast('!','Annonce','Sous-zone dans 3 minutes !');
        if(navigator.vibrate)navigator.vibrate([200,100,200]);
      }
      renderTimer();
    }else{
      // Timer reached 0 - auto advance round
      autoNextRound();
    }
  },1000);
  renderTimer();
}

function renderTimer(){
  const m=String(Math.floor(timerSec/60)).padStart(2,'0'),s=String(timerSec%60).padStart(2,'0');
  const el=document.getElementById('ptimer');el.textContent=m+':'+s;
  el.classList.toggle('urg',timerSec<=60&&timerSec>0);
}

async function autoNextRound(){
  if(!game||CU.type!=='admin')return; // only admin device advances (prevents race condition)
  // Actually: all clients detect 0, but only push to DB once
  // Use a flag to avoid double calls
  if(game._advancing)return;
  game._advancing=true;

  const nr=(game.current_round||0)+1;
  if(nr>4){
    // Game over
    await adminStopGame();
    return;
  }
  try{
    await sbPatch('games?id=eq.'+game.id,{current_round:nr,round_started_at:new Date().toISOString()});
    game.current_round=nr;game.round_started_at=new Date().toISOString();
    game._advancing=false;
    const msgs={
      1:'Manche 1 : CACHE — Les chasseurs restent immobiles. (5 min)',
      2:'Manche 2 : RECHERCHE LIBRE — Tout le monde peut se deplacer. (10 min)',
      3:'Manche 3 : SOUS-ZONE — Rejoignez la sous-zone immediatement ! (10 min)',
      4:'Manche 4 : FINAL — Phase finale ! (10 min)'
    };
    await sbPost('messages',{type:'announce',content:msgs[nr]||'Manche '+nr+' demarree',game_id:game.id});
    timerSec=ROUND_DURATIONS[nr];
    showRoundOverlay(nr);
    outOfZoneSeconds=0;malusIndex=0;totalMalus=0;wasOutOfZone=false;hideZoneBanner();
    updatePhase();
  }catch(e){game._advancing=false;}
}

function showRoundOverlay(round){
  const overlay=document.getElementById('round-overlay');
  document.getElementById('ro-round').textContent='MANCHE '+round+' / 4';
  document.getElementById('ro-name').textContent=ROUND_NAMES[round]||'';
  document.getElementById('ro-desc').textContent=ROUND_DESCS[round]||'';
  overlay.style.display='flex';
  let c=5;
  const ti=setInterval(()=>{
    document.getElementById('ro-timer').textContent='Debut dans '+c+'...';
    c--;if(c<0){clearInterval(ti);overlay.style.display='none';}
  },1000);
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
}

// ══ PHASE ═════════════════════════════════════
function updatePhase(){
  const lbl=document.getElementById('plabel'),nm=document.getElementById('pname'),tm=document.getElementById('ptimer');
  if(!game||game.status!=='active'){lbl.textContent='En attente';nm.textContent='Partie non demarree';tm.textContent='-';tm.className='ptimer nogame';return;}
  const r=game.current_round||0;
  lbl.textContent='Manche '+r+' . Partie '+game.game_number;
  nm.textContent=ROUND_NAMES[r]||'En cours';tm.className='ptimer';
  if(r===3){if(!map.hasLayer(mapLayers.subzone))map.addLayer(mapLayers.subzone);}
  else{if(map&&map.hasLayer(mapLayers.subzone))map.removeLayer(mapLayers.subzone);}
  if(game.round_started_at){const el=Math.floor((Date.now()-new Date(game.round_started_at).getTime())/1000);timerSec=Math.max(0,ROUND_DURATIONS[r]-el);}
}

function setupTopbar(){
  if(CU.type==='admin'){document.getElementById('tname').textContent='ADMIN';document.getElementById('trole').textContent='ADMIN';document.getElementById('trole').className='trole ra';document.getElementById('nadmin').style.display='flex';}
  else{document.getElementById('tname').textContent=CU.name;document.getElementById('trole').textContent=CU.role==='chasseur'?'CHASSEUR':'CHASSE';document.getElementById('trole').className='trole '+(CU.role==='chasseur'?'rh':'rc');}

function updateCount(){const a=teams.filter(t=>t.status==='active').length;document.getElementById('ocnt').textContent=showCount?a+' equipes':'-- equipes';}

// ══ POLLING ═══════════════════════════════════
function startPolling(){
  setInterval(async()=>{
    try{
      const pos=await sbGet('positions?select=*');
      if(Array.isArray(pos)){pos.forEach(p=>{const t=teams.find(t=>t.id===p.team_id);if(t&&t.id!==myId){t.lat=p.latitude;t.lng=p.longitude;}});updateTeamMarkers();}
      const ft=await sbGet('teams?select=*&order=name');
      if(Array.isArray(ft)){ft.forEach(ft=>{const t=teams.find(t=>t.id===ft.id);if(t){t.status=ft.status;t.role=ft.role;t.score=ft.score;t.badges=ft.badges;}});buildTeams();updateCount();}
      if(event_){
        const gd=await sbGet('games?event_id=eq.'+event_.id+'&status=eq.active&limit=1');
        if(Array.isArray(gd)){
          const wasA=game&&game.status==='active';
          const prevRound=game?.current_round;
          game=gd.length?gd[0]:null;
          if(!wasA&&game){toast('!','Partie','La partie a commence!');showRoundOverlay(1);startZoneCheck();}
          if(game&&prevRound&&game.current_round!==prevRound){showRoundOverlay(game.current_round);outOfZoneSeconds=0;malusIndex=0;totalMalus=0;wasOutOfZone=false;hideZoneBanner();}
          updatePhase();
        }
      }
    }catch(e){}
  },3000);
  setInterval(refreshChat,5000);
}

// ══ SCORES ════════════════════════════════════
async function refreshScores(){
  const sorted=[...teams].sort((a,b)=>(b.score||0)-(a.score||0)),max=sorted[0]?.score||1;
  document.getElementById('score-sub').textContent=game?'Partie '+game.game_number+' - Manche '+game.current_round:'En attente';
  document.getElementById('score-list').innerHTML=sorted.map((t,i)=>`<div class="srow"><div class="srank ${i===0?'gold':''}">${i===0?'#1':i+1}</div><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><div style="width:8px;height:8px;border-radius:50%;background:${t.color};flex-shrink:0"></div><span class="sname" style="color:${t.status==='eliminated'?'var(--text-dim)':t.color}">${t.name}</span>${t.status==='eliminated'?'<span class="tstatus st-e">Eliminee</span>':''}</div><div class="sbar"><div class="sbarfill" style="width:${max>0?Math.round((t.score||0)/max*100):0}%;background:linear-gradient(90deg,${t.color}66,${t.color})"></div></div></div><div class="spts">${t.score||0}</div></div>`).join('');
}
function buildTeams(){
  document.getElementById('team-list').innerHTML=teams.map(t=>`<div class="trow"><div class="tind" style="background:${t.color};box-shadow:0 0 7px ${t.color}55"></div><div class="tinfo"><div class="trname" style="color:${t.status==='eliminated'?'var(--text-dim)':'var(--text)'}">${t.name}</div><div class="trmembers">${(t.members||[]).join(', ')} . ${t.role==='chasseur'?'Chasseur':'Chasse'}</div></div><span class="tstatus ${t.status==='active'?'st-a':t.status==='eliminated'?'st-e':'st-h'}">${t.status==='active'?'Actif':t.status==='eliminated'?'Elimine':'Cache'}</span></div>`).join('');
  refreshScores();
}
function buildBadges(){
  const mb=CU.type==='team'?(teams.find(t=>t.id===myId)?.badges||[]):[];
  document.getElementById('badge-grid').innerHTML=BDEFS.map(b=>`<div class="bcard ${mb.includes(b.i)?'earn':''}"><div class="bicon">${b.i}</div><span class="bname">${b.n}</span></div>`).join('');
}
async function refreshChat(){
  try{
    const msgs=await sbGet('messages?select=*&order=created_at.asc&limit=50');
    if(!Array.isArray(msgs)||!msgs.length){document.getElementById('chat-list').innerHTML='<div style="color:var(--text-dim);font-size:13px;padding:20px 0;text-align:center">Aucun message</div>';return;}
    document.getElementById('chat-list').innerHTML=msgs.map(m=>`<div class="cmsg ${m.type==='capture'?'cap':m.type==='announce'?'ann':'ale'}"><div class="cmhead"><span class="cmtype">${m.type==='capture'?'Capture':m.type==='announce'?'Annonce':'Alerte'}</span><span class="cmtime">${new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span></div><div class="cmtext">${m.content}</div></div>`).join('');
  }catch(e){}

function buildAdminSelects(){['role-team','elim-team','score-team'].forEach(id=>{document.getElementById(id).innerHTML=teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');});}

async function adminStartGame(){
  if(!event_){toast('!','Admin','Aucun evenement');return;}
  try{
    const gn=(event_.current_game||0)+1;
    const gd=await sbPost('games',{event_id:event_.id,game_number:gn,status:'active',current_round:1,round_started_at:new Date().toISOString(),started_at:new Date().toISOString()});
    game=Array.isArray(gd)?gd[0]:gd;
    await sbPatch('events?id=eq.'+event_.id,{status:'active',current_game:gn});
    await sbPost('messages',{type:'announce',content:'Partie '+gn+' demarree - Manche 1 : CACHE (5 min) — Les chasseurs restent immobiles !',game_id:game.id});
    toast('>','Partie','Partie '+gn+' lancee!');
    showRoundOverlay(1);timerSec=ROUND_DURATIONS[1];updatePhase();startZoneCheck();
    document.getElementById('btn-stop').disabled=false;
  }catch(e){toast('X','Erreur',''+e.message);}
}

async function adminStopGame(){
  if(!game)return;
  try{
    await sbPatch('games?id=eq.'+game.id,{status:'finished',finished_at:new Date().toISOString()});
    await sbPost('messages',{type:'announce',content:'Partie terminee ! Consultez le classement final.',game_id:game.id});
    game.status='finished';
    if(zoneCheckInt){clearInterval(zoneCheckInt);zoneCheckInt=null;}
    hideZoneBanner();
    toast('[]','Partie','Terminee');
    document.getElementById('btn-stop').disabled=true;updatePhase();
  }catch(e){toast('X','Erreur',''+e.message);}
}

async function adminSetRole(){
  const tid=document.getElementById('role-team').value,role=document.getElementById('role-val').value;
  try{await sbPatch('teams?id=eq.'+tid,{role});const t=teams.find(t=>t.id===tid);if(t){t.role=role;buildTeams();}toast('~','Role','Mis a jour');closeDrawer('admin');}catch(e){toast('X','Erreur',''+e.message);}
}
async function adminEliminate(){
  const tid=document.getElementById('elim-team').value;
  try{
    await sbPatch('teams?id=eq.'+tid,{status:'eliminated'});
    const t=teams.find(t=>t.id===tid);
    if(t){t.status='eliminated';await sbPost('messages',{type:'alert',content:t.name+' eliminee par admin',game_id:game?.id});buildTeams();toast('X',t.name,'Eliminee');}
    closeDrawer('admin');
  }catch(e){toast('X','Erreur',''+e.message);}
}
async function adminCorrectScore(){
  const tid=document.getElementById('score-team').value,pts=parseInt(document.getElementById('score-pts').value),rsn=document.getElementById('score-rsn').value||'Correction admin';
  if(isNaN(pts)){toast('!','Admin','Entrez un nombre');return;}

  }catch(e){toast('X','Erreur',''+e.message);}

function navClick(btn,id){document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');if(id)openDrawer(id);}
function toast(icon,title,text){const el=document.createElement('div');el.className='toast';el.innerHTML='<div class="ticon">'+icon+'</div><div class="ttext"><div class="ttitle">'+title+'</div><div>'+text+'</div></div>';document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3300);}
function logout(){if(gpsId)navigator.geolocation.clearWatch(gpsId);clearInterval(timerInt);if(zoneCheckInt)clearInterval(zoneCheckInt);if(myMarker)map.removeLayer(myMarker);CU=null;myId=null;game=null;document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';}

init();
<\/script>
